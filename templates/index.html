<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<title>离散数学学习系统</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

.layout {
    display: flex;
    height: 100vh;
}

/* 左侧 */
.left {
    width: 240px;
    background: #0b1220;
    padding: 10px;
}

.btn {
    width: 100%;
    padding: 10px;
    background: #1f2937;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    margin-bottom: 10px;
}

.session {
    padding: 10px;
    background: #111827;
    border-radius: 8px;
    margin-bottom: 8px;
    cursor: pointer;
    position: relative;
}

.session:hover {
    background: #1f2937;
}

.del {
    position: absolute;
    right: 8px;
    top: 8px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #ef4444;
    border: none;
    cursor: pointer;
}

/* 中间 */
.center {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.chat {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
}

.msg {
    max-width: 70%;
    padding: 10px;
    margin: 6px;
    border-radius: 10px;
    white-space: pre-wrap;
}

.user {
    background: #3b82f6;
    margin-left: auto;
}

.ai {
    background: #1f2937;
}

/* 输入 */
.input {
    display: flex;
    padding: 10px;
    background: #0b1220;
    gap: 8px;
}

input {
    flex: 1;
    padding: 8px;
}

/* 右侧 */
.right {
    width: 260px;
    background: #0b1220;
    padding: 10px;
}

.small {
    font-size: 13px;
    color: #aaa;
}

#fileName {
    font-size: 12px;
    color: #aaa;
}
</style>

</head>

<body>

<div class="layout">

    <div class="left">
        <button class="btn" onclick="newChat()">新对话</button>
        <div id="sessions"></div>
    </div>

    <div class="center">
        <div id="chat" class="chat"></div>

        <div class="input">
            <input id="text" placeholder="输入内容">
            <button onclick="send()">发送</button>

            <input id="img" type="file" style="display:none" onchange="showFileName()">
            <button onclick="document.getElementById('img').click()">图片</button>

            <button onclick="ocr()">OCR</button>

            <span id="fileName"></span>
        </div>
    </div>

    <div class="right">
        <div>会话信息</div>
        <div id="info" class="small"></div>

        <hr>

        <div>OCR结果</div>
        <div id="ocrResult" class="small"></div>
    </div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
