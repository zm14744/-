<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>离散数学学习系统</title>

<style>
* { box-sizing:border-box; }

body {
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

.layout { display:flex; height:100vh; }

/* 左侧 */
.left {
    width:240px;
    background:#0b1220;
    padding:10px;
    display:flex;
    flex-direction:column;
}

.btn {
    width:100%;
    padding:10px;
    background:#1f2937;
    border:none;
    color:white;
    border-radius:8px;
    margin-bottom:10px;
}

/* 中间 */
.center {
    flex:1;
    display:flex;
    flex-direction:column;
}

.chat {
    flex:1;
    overflow-y:auto;
    padding:20px;
}

.msg {
    max-width:75%;
    padding:14px 18px;
    margin:10px 0;
    border-radius:12px;
    line-height:1.6;
    word-break:break-word;
}

.user { background:#3b82f6; margin-left:auto; }
.ai { background:#1f2937; }

/* ✔️ 关键修复：Markdown排版 */
.ai-content p {
    margin:10px 0;
}

.ai-content h1,
.ai-content h2,
.ai-content h3 {
    margin:14px 0 8px;
}

.ai-content ul,
.ai-content ol {
    padding-left:20px;
    margin:10px 0;
}

/* ✔️ 公式 */
.MathJax_Display {
    margin:14px 0 !important;
    overflow-x:auto;
}

/* 输入 */
.input {
    display:flex;
    padding:10px;
    background:#0b1220;
}

.input input {
    flex:1;
    padding:8px;
    background:#1f2937;
    border:none;
    color:white;
}

.input button {
    padding:8px 20px;
    background:#3b82f6;
    border:none;
    color:white;
}

/* 右侧 */
.right {
    width:240px;
    background:#0b1220;
    padding:10px;
}

.small {
    font-size:13px;
    color:#aaa;
    white-space:pre-wrap;
}

.empty-tip {
    text-align:center;
    margin-top:60px;
    color:#6b7280;
}
</style>

<!-- MathJax -->
<script>
window.MathJax = {
  tex: {
    inlineMath: [['\\(', '\\)'], ['$', '$']],
    displayMath: [['\\[', '\\]'], ['$$', '$$']]
  },
  svg: { fontCache: 'global' }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

</head>

<body>

<div class="layout">

<div class="left">
    <button class="btn" onclick="newChat()">＋ 新对话</button>
    <div id="sessions"></div>
</div>

<div class="center">
    <div id="chat" class="chat"></div>

    <div class="input">
        <input id="text" placeholder="输入消息…">
        <button onclick="send()">发送</button>
    </div>
</div>

<div class="right">
    <div style="margin-bottom:8px;">📋 会话信息</div>
    <div id="info" class="small"></div>
</div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
