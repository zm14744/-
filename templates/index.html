<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<title>离散数学学习系统</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

.layout {
    display: flex;
    height: 100vh;
}

/* 左侧 */
.left {
    width: 240px;
    background: #0b1220;
    padding: 10px;
}

.btn {
    width: 100%;
    padding: 10px;
    background: #1f2937;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    margin-bottom: 10px;
}

.session {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px;
    background: #111827;
    border-radius: 8px;
    margin-bottom: 8px;
    cursor: default;
}

.session span {
    flex: 1;
    cursor: pointer;
}

.session .del {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #ef4444;
    border: none;
    color: white;
    font-size: 12px;
    cursor: pointer;
    flex-shrink: 0;
}

/* 中间 */
.center {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.chat {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
}

.msg {
    max-width: 70%;
    padding: 10px;
    margin: 6px;
    border-radius: 10px;
    white-space: pre-wrap;
    word-wrap: break-word;
}

.user {
    background: #3b82f6;
    margin-left: auto;
}

.ai {
    background: #1f2937;
}

/* Markdown 内容样式 */
.ai h1, .ai h2, .ai h3 { margin: 8px 0; font-weight: bold; }
.ai ul, .ai ol { padding-left: 20px; margin: 6px 0; }
.ai code { background: #2d3748; padding: 2px 6px; border-radius: 4px; font-family: monospace; }
.ai pre { background: #1a202c; padding: 10px; border-radius: 8px; overflow-x: auto; }
.ai strong { font-weight: bold; color: #fbbf24; }
.ai em { font-style: italic; }

/* 输入 */
.input {
    display: flex;
    padding: 10px;
    background: #0b1220;
    gap: 8px;
}

input {
    flex: 1;
    padding: 8px;
}

/* 右侧 */
.right {
    width: 260px;
    background: #0b1220;
    padding: 10px;
}

.small {
    font-size: 13px;
    color: #aaa;
    white-space: pre-wrap;
}
</style>

<!-- ========================= -->
<!-- MathJax -->
<!-- ========================= -->
<script>
window.MathJax = {
  tex: {
    inlineMath: [['\\(', '\\)'], ['$','$']]
  }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<!-- ========================= -->
<!-- Markdown 渲染库 -->
<!-- ========================= -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

</head>

<body>

<div class="layout">

    <div class="left">
        <button class="btn" onclick="newChat()">新对话</button>
        <div id="sessions"></div>
    </div>

    <div class="center">
        <div id="chat" class="chat"></div>

        <div class="input">
            <input id="text" placeholder="输入内容">
            <button onclick="send()">发送</button>
        </div>
    </div>

    <div class="right">
        <div>会话信息</div>
        <div id="info" class="small"></div>
    </div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
