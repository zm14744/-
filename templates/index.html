<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>离散数学AI助手</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- MathJax 全局配置，兼容$ $$ \[ \( 公式 -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true,
                packages: {'[+]': ['ams']}
            },
            svg: { fontCache: "global" },
            options: { ignoreHtmlClass: "no-mathjax" }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <style>
        *{box-sizing: border-box;margin:0;padding:0;}
        body{display:flex;height:100vh;font-family:system-ui}
        .sidebar{width:240px;border-right:1px solid #eee;padding:10px;display:flex;flex-direction:column}
        .session{display:flex;justify-content:space-between;padding:6px 8px;margin:4px 0;border-radius:6px;cursor:pointer;background:#f5f5f5}
        .session:hover{background:#e9e9e9}
        .del{border:none;background:#ff5555;color:#fff;border-radius:4px;padding:2px 6px;cursor:pointer}
        .main{flex:1;display:flex;flex-direction:column}
        #chat{flex:1;padding:12px;overflow-y:auto}
        .msg{margin:8px 0;padding:10px;border-radius:8px;max-width:85%}
        .msg.user{background:#007aff;color:#fff;margin-left:auto}
        .msg.ai{background:#f0f0f0;margin-right:auto}
        .input-area{display:flex;padding:10px;border-top:1px solid #eee}
        #text{flex:1;padding:10px;border:1px solid #ddd;border-radius:6px;resize:none;height:80px}
        #sendBtn{margin-left:8px;padding:0 16px;border:none;background:#007aff;color:#fff;border-radius:6px;cursor:pointer}
        #info{padding:8px;font-size:12px;color:#666;border-top:1px solid #eee;white-space:pre-line}
        .empty-tip{text-align:center;color:#999;padding:40px}
    </style>
</head>
<body>
    <div class="sidebar">
        <h3>对话列表</h3>
        <div id="sessions"></div>
        <div id="info"></div>
    </div>
    <div class="main">
        <div id="chat"></div>
        <div class="input-area">
            <textarea id="text" placeholder="输入消息…"></textarea>
            <button id="sendBtn" onclick="send()">发送</button>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
