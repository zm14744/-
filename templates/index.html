<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>离散数学学习系统</title>
<style>
* { box-sizing:border-box; }
body { margin:0; font-family:Arial, sans-serif; background:#0f172a; color:white; }
.layout { display:flex; height:100vh; }

/* 左侧 */
.left { width:240px; background:#0b1220; padding:10px; display:flex; flex-direction:column; }
.btn { width:100%; padding:10px; background:#1f2937; border:none; color:white; border-radius:8px; cursor:pointer; margin-bottom:10px; transition:.2s; }
.btn:hover { background:#374151; }
#sessions { flex:1; overflow-y:auto; }
.session {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px; background:#111827; border-radius:8px;
  margin-bottom:8px; cursor:default; transition:.2s;
}
.session:hover { background:#1f2937; }
.session span { flex:1; cursor:pointer; font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

/* 删除按钮美化 */
.session .del {
  width:24px; height:24px; border-radius:50%;
  border:none; background:#374151; color:#aaa;
  font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition: all .2s;
  flex-shrink:0; margin-left:6px;
}
.session .del:hover { background:#ef4444; color:white; transform:scale(1.1); }
.session .del:active { transform:scale(0.9); }

/* 中间 */
.center { flex:1; display:flex; flex-direction:column; min-width:0; }
.chat { flex:1; overflow-y:auto; padding:10px; }
.msg { max-width:75%; padding:10px; margin:6px 0; border-radius:12px; word-wrap:break-word; }
.user { background:#3b82f6; margin-left:auto; }
.ai { background:#1f2937; }

/* Markdown 样式 */
.ai h1,.ai h2,.ai h3 { margin:8px 0; font-weight:bold; }
.ai ul,.ai ol { padding-left:20px; margin:6px 0; }
.ai code { background:#2d3748; padding:2px 6px; border-radius:4px; font-family:monospace; }
.ai pre { background:#1a202c; padding:10px; border-radius:8px; overflow-x:auto; }
.ai strong { font-weight:bold; color:#fbbf24; }
.ai em { font-style:italic; }

.input { display:flex; padding:10px; background:#0b1220; gap:8px; }
.input input { flex:1; padding:8px 12px; border:none; border-radius:6px; outline:none; background:#1f2937; color:white; }
.input input:disabled { opacity:0.5; cursor:not-allowed; }
.input button { padding:8px 20px; background:#3b82f6; border:none; border-radius:6px; color:white; cursor:pointer; transition:.2s; }
.input button:disabled { opacity:0.5; cursor:not-allowed; }
.input button:hover:not(:disabled) { background:#2563eb; }

/* 右侧 */
.right { width:240px; background:#0b1220; padding:10px; }
.small { font-size:13px; color:#aaa; white-space:pre-wrap; }

.empty-tip { text-align:center; color:#6b7280; margin-top:60px; font-size:14px; }
</style>

<!-- MathJax -->
<script>
window.MathJax = { tex: { inlineMath: [['\\(', '\\)'], ['$','$']] } };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<!-- Markdown -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<div class="layout">
  <div class="left">
    <button class="btn" onclick="newChat()">＋ 新对话</button>
    <div id="sessions"></div>
  </div>

  <div class="center">
    <div id="chat" class="chat"></div>
    <div class="input">
      <input id="text" placeholder="输入消息…" disabled>
      <button id="sendBtn" onclick="send()" disabled>发送</button>
    </div>
  </div>

  <div class="right">
    <div style="margin-bottom:8px;">📋 会话信息</div>
    <div id="info" class="small"></div>
  </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
